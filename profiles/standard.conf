# Standard collection — all collectors, no file hashing
PROFILE_NAME="standard"
PROFILE_DESCRIPTION="Standard collection — all collectors, no file hashing"
PROFILE_TIMEOUT=300
PROFILE_HASH_FILES=false
PROFILE_YARA_SCAN=false
PROFILE_COLLECTORS=(
    system_info
    processes
    network
    users
    persistence
    filesystem
    logs
    browser
    shell_history
    usb_devices
    installed_software
    kernel_modules
    firewall
    environment
    clipboard
    certificates
)

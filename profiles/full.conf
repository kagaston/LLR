# Full collection — all collectors with file hashing and YARA scanning
PROFILE_NAME="full"
PROFILE_DESCRIPTION="Full collection — all collectors with file hashing and YARA scanning"
PROFILE_TIMEOUT=600
PROFILE_HASH_FILES=true
PROFILE_YARA_SCAN=true
PROFILE_COLLECTORS=(
    system_info
    processes
    network
    users
    persistence
    filesystem
    logs
    browser
    shell_history
    usb_devices
    installed_software
    kernel_modules
    firewall
    environment
    clipboard
    certificates
)
